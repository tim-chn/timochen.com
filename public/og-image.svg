<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base: dark ink -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#060d12"/>
      <stop offset="100%" stop-color="#06090d"/>
    </linearGradient>
    <!-- Edge vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <!-- Aurora band horizontal fade gradients -->
    <linearGradient id="al0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4db8c7" stop-opacity="0.0"/>
      <stop offset="20%"  stop-color="#4db8c7" stop-opacity="1.0"/>
      <stop offset="80%"  stop-color="#38d4a0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38d4a0" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="al1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#38d4a0" stop-opacity="0.0"/>
      <stop offset="25%"  stop-color="#38d4a0" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#6bcfe0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6bcfe0" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="al2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4db8c7" stop-opacity="0.0"/>
      <stop offset="30%"  stop-color="#4db8c7" stop-opacity="0.85"/>
      <stop offset="70%"  stop-color="#38d4a0" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#4db8c7" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="al3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6bcfe0" stop-opacity="0.0"/>
      <stop offset="35%"  stop-color="#6bcfe0" stop-opacity="0.75"/>
      <stop offset="65%"  stop-color="#4db8c7" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#4db8c7" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="al4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#38d4a0" stop-opacity="0.0"/>
      <stop offset="40%"  stop-color="#38d4a0" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#4db8c7" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Mountain layer gradients -->
    <linearGradient id="mg0" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a8f9e" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0c1219" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="mg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2430" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#0c1219" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="mg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06090d" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#06090d" stop-opacity="1.00"/>
    </linearGradient>
    <!-- Blur for aurora bands -->
    <filter id="ab" x="-5%" y="-150%" width="110%" height="400%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <!-- Glow for bright stars -->
    <filter id="sg" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Aurora borealis bands -->
  <path d="M -50 118 C 180 88 420 128 660 105 C 840 88 1020 118 1250 100 L 1250 162 C 1020 180 840 150 660 165 C 420 188 180 148 -50 178 Z"
        fill="url(#al0)" filter="url(#ab)" opacity="0.90"/>
  <path d="M -50 175 C 220 148 500 192 760 165 C 960 145 1100 175 1250 158 L 1250 218 C 1100 235 960 205 760 225 C 500 252 220 208 -50 235 Z"
        fill="url(#al1)" filter="url(#ab)" opacity="0.82"/>
  <path d="M -50 62 C 150 38 380 72 620 52 C 820 36 1000 62 1250 48 L 1250 98 C 1000 112 820 86 620 102 C 380 122 150 88 -50 112 Z"
        fill="url(#al2)" filter="url(#ab)" opacity="0.70"/>
  <path d="M -50 230 C 280 205 560 248 820 222 C 1000 205 1120 228 1250 215 L 1250 268 C 1120 281 1000 258 820 272 C 560 298 280 255 -50 280 Z"
        fill="url(#al3)" filter="url(#ab)" opacity="0.62"/>
  <path d="M -50 285 C 300 262 620 305 900 278 C 1060 262 1160 285 1250 272 L 1250 322 C 1160 335 1060 312 900 328 C 620 355 300 312 -50 335 Z"
        fill="url(#al4)" filter="url(#ab)" opacity="0.48"/>

  <!-- Stars (below aurora, above mountains) -->
  <circle cx="382"  cy="380" r="1.3" fill="white" opacity="0.72"/>
  <circle cx="652"  cy="370" r="1.5" fill="white" opacity="0.85"/>
  <circle cx="652"  cy="370" r="5"   fill="white" opacity="0.07" filter="url(#sg)"/>
  <circle cx="922"  cy="385" r="1.0" fill="white" opacity="0.60"/>
  <circle cx="1082" cy="372" r="1.2" fill="white" opacity="0.68"/>
  <circle cx="1082" cy="372" r="4"   fill="white" opacity="0.06" filter="url(#sg)"/>
  <circle cx="128"  cy="430" r="1.0" fill="white" opacity="0.55"/>
  <circle cx="310"  cy="450" r="0.8" fill="white" opacity="0.45"/>
  <circle cx="820"  cy="410" r="0.9" fill="white" opacity="0.52"/>
  <circle cx="1148" cy="420" r="1.1" fill="white" opacity="0.48"/>
  <circle cx="52"   cy="465" r="0.8" fill="white" opacity="0.38"/>
  <circle cx="476"  cy="455" r="0.9" fill="white" opacity="0.42"/>
  <circle cx="1048" cy="470" r="0.8" fill="white" opacity="0.35"/>
  <circle cx="742"  cy="395" r="0.8" fill="white" opacity="0.50"/>
  <circle cx="200"  cy="415" r="0.7" fill="white" opacity="0.42"/>
  <circle cx="560"  cy="435" r="0.8" fill="white" opacity="0.40"/>
  <circle cx="1010" cy="400" r="1.0" fill="white" opacity="0.55"/>
  <circle cx="382"  cy="380" r="4"   fill="white" opacity="0.06" filter="url(#sg)"/>

  <!-- Mountain silhouettes -->
  <path d="M 0 630 L 0 540 L 80 520 L 180 528 L 280 505 L 400 518 L 520 492 L 640 512 L 760 488 L 880 505 L 1000 480 L 1120 498 L 1200 485 L 1200 630 Z"
        fill="url(#mg0)"/>
  <path d="M 0 630 L 0 562 L 100 548 L 220 556 L 360 534 L 500 546 L 640 525 L 780 540 L 920 520 L 1060 536 L 1200 522 L 1200 630 Z"
        fill="url(#mg1)"/>
  <path d="M 0 630 L 0 585 L 120 572 L 280 578 L 460 562 L 640 572 L 820 556 L 1000 568 L 1200 555 L 1200 630 Z"
        fill="url(#mg2)"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Generic location -->
  <text
    x="100" y="188"
    fill="#4db8c7"
    font-size="19"
    font-weight="600"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    letter-spacing="7"
  >YOUR LOCATION</text>

  <!-- Generic title -->
  <text
    x="95" y="318"
    fill="#e9f0f4"
    font-size="108"
    font-weight="800"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    letter-spacing="-2"
  >Your Name</text>

  <!-- Generic subtitle -->
  <text
    x="100" y="388"
    fill="#b8c9d4"
    font-size="34"
    font-family="Georgia, 'Times New Roman', serif"
    opacity="0.92"
  >Professional Title</text>
</svg>
