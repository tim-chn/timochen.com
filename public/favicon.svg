<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg-glow" cx="40%" cy="35%" r="70%">
      <stop offset="0%"  stop-color="#1a5260" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06090d" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="aurora-1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#38d4a0" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#4db8c7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38d4a0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aurora-2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#4db8c7" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#6bcfe0" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#38d4a0" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-f" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <clipPath id="rounded">
      <rect width="64" height="64" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg-glow)"/>

  <!-- Aurora ribbons -->
  <g clip-path="url(#rounded)" filter="url(#blur-f)">
    <path d="M -8 22 C 10 18 28 24 46 20 C 58 17 66 21 72 19 L 72 29 C 66 31 58 27 46 30 C 28 34 10 28 -8 32 Z"
          fill="url(#aurora-1)" opacity="0.95"/>
    <path d="M -8 30 C 12 27 30 33 50 29 C 60 27 68 30 72 28 L 72 38 C 68 40 60 37 50 39 C 30 43 12 37 -8 40 Z"
          fill="url(#aurora-2)" opacity="0.80"/>
  </g>

  <!-- Mountain silhouettes -->
  <g clip-path="url(#rounded)">
    <path d="M 0 64 L 0 50 L 10 46 L 20 49 L 30 43 L 40 47 L 50 41 L 60 45 L 64 43 L 64 64 Z"
          fill="#06090d" opacity="0.70"/>
    <path d="M 0 64 L 0 55 L 12 52 L 24 54 L 36 50 L 48 53 L 60 50 L 64 51 L 64 64 Z"
          fill="#06090d" opacity="0.88"/>
  </g>

  <!-- Stars -->
  <circle cx="12" cy="12" r="0.9" fill="white" opacity="0.75"/>
  <circle cx="52" cy="9"  r="1.1" fill="white" opacity="0.85"/>
  <circle cx="34" cy="7"  r="0.7" fill="white" opacity="0.60"/>
  <circle cx="57" cy="18" r="0.7" fill="white" opacity="0.55"/>

  <!-- Generic text -->
  <text
    x="32"
    y="43"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
    font-weight="800"
    font-size="26"
    letter-spacing="-1"
    fill="#e9f0f4"
  >GP</text>
</svg>
